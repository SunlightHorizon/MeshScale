name: MeshScale CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: amd64
            fdb_arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            fdb_arch: aarch64

    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      SWIFT_VERSION: 6.2.1
      SWIFT_BUILD_PATH: .build-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        if: matrix.arch == 'amd64'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Set up Swift on Linux ARM64
        if: matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          SWIFT_BASE_URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404-aarch64/swift-${SWIFT_VERSION}-RELEASE"
          SWIFT_ARCHIVE="swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04-aarch64.tar.gz"
          curl -L --retry 5 --retry-delay 2 -o "/tmp/${SWIFT_ARCHIVE}" "${SWIFT_BASE_URL}/${SWIFT_ARCHIVE}"
          sudo rm -rf /opt/swift-${SWIFT_VERSION}-arm64
          sudo mkdir -p /opt/swift-${SWIFT_VERSION}-arm64
          sudo tar -xzf "/tmp/${SWIFT_ARCHIVE}" -C /opt/swift-${SWIFT_VERSION}-arm64 --strip-components=1
          echo "/opt/swift-${SWIFT_VERSION}-arm64/usr/bin" >> "$GITHUB_PATH"

      - name: Install FoundationDB dependencies on Linux
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          curl -L --retry 5 --retry-delay 2 \
            -o /tmp/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb \
            https://github.com/apple/foundationdb/releases/download/7.3.69/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb
          curl -L --retry 5 --retry-delay 2 \
            -o /tmp/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb \
            https://github.com/apple/foundationdb/releases/download/7.3.69/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb
          sudo dpkg -i /tmp/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb /tmp/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb

      - name: Build MeshScale binaries
        working-directory: meshscale-swift
        run: |
          set -euo pipefail
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleCLI
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleControlPlane
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleWorker

      - name: Package MeshScale CLI and toolchains
        working-directory: meshscale-swift
        run: |
          set -euo pipefail
          BIN_DIR="$(swift build --build-path "${SWIFT_BUILD_PATH}" -c release --show-bin-path)"
          DIST_DIR="$PWD/release-dist"
          ASSET_DIR="$PWD/release-assets"
          TOOLCHAIN_ROOT="$(python3 -c 'import json, os, shutil, subprocess, sys; info = json.loads(subprocess.check_output(["swiftc", "-print-target-info"], text=True)) if sys.platform == "darwin" else None; runtime_resource_path = info["paths"]["runtimeResourcePath"] if info else None; swift_path = os.path.realpath(shutil.which("swift")) if not info else None; toolchain_root = os.path.dirname(os.path.dirname(os.path.dirname(runtime_resource_path))) if info else os.path.dirname(os.path.dirname(os.path.dirname(swift_path))); print(toolchain_root)')"

          rm -rf "$DIST_DIR" "$ASSET_DIR"
          mkdir -p \
            "$DIST_DIR/cli" \
            "$DIST_DIR/controlplane/foundationdb/include" \
            "$DIST_DIR/controlplane/foundationdb/lib" \
            "$DIST_DIR/worker/foundationdb/include" \
            "$DIST_DIR/worker/foundationdb/lib" \
            "$ASSET_DIR"

          test -f "$BIN_DIR/MeshScaleCLI"
          test -f "$BIN_DIR/MeshScaleControlPlane"
          test -f "$BIN_DIR/MeshScaleWorker"
          cp "$BIN_DIR/MeshScaleCLI" "$DIST_DIR/cli/meshscale"
          cp "$BIN_DIR/MeshScaleControlPlane" "$DIST_DIR/controlplane/MeshScaleControlPlane"
          cp "$BIN_DIR/MeshScaleWorker" "$DIST_DIR/worker/MeshScaleWorker"

          rsync -a "$TOOLCHAIN_ROOT/" "$DIST_DIR/controlplane/swift-toolchain/"
          rsync -a "$TOOLCHAIN_ROOT/" "$DIST_DIR/worker/swift-toolchain/"

          rsync -a /usr/include/foundationdb/ "$DIST_DIR/controlplane/foundationdb/include/foundationdb/"
          rsync -a /usr/include/foundationdb/ "$DIST_DIR/worker/foundationdb/include/foundationdb/"
          find /usr/lib /usr/lib64 /lib /lib64 -maxdepth 2 \( -name 'libfdb_c.so' -o -name 'libfdb_c.so.*' \) -print0 2>/dev/null | \
            while IFS= read -r -d '' lib; do
              cp -a "$lib" "$DIST_DIR/controlplane/foundationdb/lib/"
              cp -a "$lib" "$DIST_DIR/worker/foundationdb/lib/"
            done

          tar -C "$DIST_DIR/cli" -czf "$ASSET_DIR/meshscale-cli-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" meshscale
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-toolchain-controlplane-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" controlplane
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-toolchain-worker-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" worker

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: meshscale-assets-${{ matrix.platform }}-${{ matrix.arch }}
          path: meshscale-swift/release-assets/*

  publish:
    name: Publish Release Assets
    runs-on: ubuntu-24.04
    needs: build
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate toolchain manifest
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 -c 'import datetime, hashlib, json, os; from pathlib import Path; version = os.environ["RELEASE_VERSION"]; repository = os.environ["REPOSITORY"]; assets_dir = Path("release-assets"); artifacts = [{"version": version, "role": archive.name.removesuffix(".tar.gz").split("-")[2], "platform": archive.name.removesuffix(".tar.gz").split("-")[3], "arch": archive.name.removesuffix(".tar.gz").split("-")[4], "url": f"https://github.com/{repository}/releases/download/{version}/{archive.name}", "sha256": hashlib.sha256(archive.read_bytes()).hexdigest(), "executables": ["MeshScaleControlPlane" if archive.name.removesuffix(".tar.gz").split("-")[2] == "controlplane" else "MeshScaleWorker"]} for archive in sorted(assets_dir.glob("meshscale-toolchain-*.tar.gz"))]; manifest = {"schemaVersion": 1, "latestVersion": version, "generatedAt": datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"), "artifacts": artifacts}; (assets_dir / "meshscale-toolchains.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")'

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/meshscale-toolchains.json
