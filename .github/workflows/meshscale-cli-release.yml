name: MeshScale CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: amd64
            fdb_arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            fdb_arch: aarch64

    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      SWIFT_VERSION: 6.2.1
      SWIFT_BUILD_PATH: .build-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        if: matrix.arch == 'amd64'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Set up Swift on Linux ARM64
        if: matrix.arch == 'arm64'
        run: |
          set -euo pipefail
          SWIFT_BASE_URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404-aarch64/swift-${SWIFT_VERSION}-RELEASE"
          SWIFT_ARCHIVE="swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04-aarch64.tar.gz"
          curl -L --retry 5 --retry-delay 2 -o "/tmp/${SWIFT_ARCHIVE}" "${SWIFT_BASE_URL}/${SWIFT_ARCHIVE}"
          sudo rm -rf /opt/swift-${SWIFT_VERSION}-arm64
          sudo mkdir -p /opt/swift-${SWIFT_VERSION}-arm64
          sudo tar -xzf "/tmp/${SWIFT_ARCHIVE}" -C /opt/swift-${SWIFT_VERSION}-arm64 --strip-components=1
          echo "/opt/swift-${SWIFT_VERSION}-arm64/usr/bin" >> "$GITHUB_PATH"

      - name: Install FoundationDB dependencies on Linux
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl
          curl -L --retry 5 --retry-delay 2 \
            -o /tmp/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb \
            https://github.com/apple/foundationdb/releases/download/7.3.69/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb
          curl -L --retry 5 --retry-delay 2 \
            -o /tmp/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb \
            https://github.com/apple/foundationdb/releases/download/7.3.69/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb
          sudo dpkg -i /tmp/foundationdb-clients_7.3.69-1_${{ matrix.fdb_arch }}.deb /tmp/foundationdb-server_7.3.69-1_${{ matrix.fdb_arch }}.deb

      - name: Build MeshScale binaries
        working-directory: meshscale-swift
        run: |
          set -euo pipefail
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleCLI
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleControlPlane
          swift build --build-path "${SWIFT_BUILD_PATH}" -c release --product MeshScaleWorker

      - name: Package MeshScale binaries and control plane dependencies
        working-directory: meshscale-swift
        run: |
          set -euo pipefail
          BIN_DIR="$(swift build --build-path "${SWIFT_BUILD_PATH}" -c release --show-bin-path)"
          DIST_DIR="$PWD/release-dist"
          ASSET_DIR="$PWD/release-assets"
          TOOLCHAIN_ROOT="$(dirname "$(dirname "$(dirname "$(realpath "$(command -v swift)")")")")"
          LIB_SEARCH_DIRS=()
          for dir in /usr/lib /usr/lib64 /lib /lib64; do
            if [ -d "$dir" ]; then
              LIB_SEARCH_DIRS+=("$dir")
            fi
          done

          rm -rf "$DIST_DIR" "$ASSET_DIR"
          mkdir -p \
            "$DIST_DIR/cli" \
            "$DIST_DIR/controlplane" \
            "$DIST_DIR/worker" \
            "$DIST_DIR/swift-toolchain" \
            "$DIST_DIR/foundationdb/include/foundationdb" \
            "$DIST_DIR/foundationdb/lib" \
            "$ASSET_DIR"

          test -f "$BIN_DIR/MeshScaleCLI"
          test -f "$BIN_DIR/MeshScaleControlPlane"
          test -f "$BIN_DIR/MeshScaleWorker"
          cp "$BIN_DIR/MeshScaleCLI" "$DIST_DIR/cli/meshscale"
          cp "$BIN_DIR/MeshScaleControlPlane" "$DIST_DIR/controlplane/MeshScaleControlPlane"
          cp "$BIN_DIR/MeshScaleWorker" "$DIST_DIR/worker/MeshScaleWorker"

          ls -la "$BIN_DIR"
          rsync -a "$TOOLCHAIN_ROOT/" "$DIST_DIR/swift-toolchain/"
          rsync -a /usr/include/foundationdb/ "$DIST_DIR/foundationdb/include/foundationdb/"
          find "${LIB_SEARCH_DIRS[@]}" -maxdepth 2 \( -name 'libfdb_c.so' -o -name 'libfdb_c.so.*' \) -print0 | \
            while IFS= read -r -d '' lib; do
              cp -a "$lib" "$DIST_DIR/foundationdb/lib/"
            done

          tar -C "$DIST_DIR/cli" -czf "$ASSET_DIR/meshscale-cli-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" meshscale
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-controlplane-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" controlplane
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-worker-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" worker
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-swift-toolchain-controlplane-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" swift-toolchain
          tar -C "$DIST_DIR" -czf "$ASSET_DIR/meshscale-foundationdb-controlplane-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" foundationdb

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: meshscale-assets-${{ matrix.platform }}-${{ matrix.arch }}
          path: meshscale-swift/release-assets/*

  publish:
    name: Publish Release Assets
    runs-on: ubuntu-24.04
    needs: build
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Install manifest tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate toolchain manifest
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          ARTIFACTS_JSON="$(mktemp)"
          printf '[]\n' > "$ARTIFACTS_JSON"
          GENERATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          for archive in \
            release-assets/meshscale-controlplane-*.tar.gz \
            release-assets/meshscale-worker-*.tar.gz \
            release-assets/meshscale-swift-toolchain-controlplane-*.tar.gz \
            release-assets/meshscale-foundationdb-controlplane-*.tar.gz; do
            [ -f "$archive" ] || continue
            filename="$(basename "$archive" .tar.gz)"
            role=""
            component="binary"
            install_subpath=""
            executable=""
            platform=""
            arch=""

            case "$filename" in
              meshscale-controlplane-*)
                role="controlplane"
                component="binary"
                executable="MeshScaleControlPlane"
                platform="$(printf '%s' "$filename" | cut -d- -f3)"
                arch="$(printf '%s' "$filename" | cut -d- -f4)"
                ;;
              meshscale-worker-*)
                role="worker"
                component="binary"
                executable="MeshScaleWorker"
                platform="$(printf '%s' "$filename" | cut -d- -f3)"
                arch="$(printf '%s' "$filename" | cut -d- -f4)"
                ;;
              meshscale-swift-toolchain-controlplane-*)
                role="controlplane"
                component="swift-toolchain"
                install_subpath="swift-toolchain"
                platform="$(printf '%s' "$filename" | cut -d- -f5)"
                arch="$(printf '%s' "$filename" | cut -d- -f6)"
                ;;
              meshscale-foundationdb-controlplane-*)
                role="controlplane"
                component="foundationdb"
                install_subpath="foundationdb"
                platform="$(printf '%s' "$filename" | cut -d- -f4)"
                arch="$(printf '%s' "$filename" | cut -d- -f5)"
                ;;
              *)
                echo "Skipping unrecognized archive $archive" >&2
                continue
                ;;
            esac

            checksum="$(sha256sum "$archive" | awk '{print $1}')"

            tmp_json="$(mktemp)"
            jq \
              --arg version "$RELEASE_VERSION" \
              --arg role "$role" \
              --arg component "$component" \
              --arg installSubpath "$install_subpath" \
              --arg platform "$platform" \
              --arg arch "$arch" \
              --arg url "https://github.com/${REPOSITORY}/releases/download/${RELEASE_VERSION}/$(basename "$archive")" \
              --arg sha256 "$checksum" \
              --arg executable "$executable" \
              '. + [{
                version: $version,
                role: $role,
                component: $component,
                installSubpath: (if $installSubpath == "" then null else $installSubpath end),
                platform: $platform,
                arch: $arch,
                url: $url,
                sha256: $sha256,
                executables: (if $executable == "" then [] else [$executable] end)
              }]' \
              "$ARTIFACTS_JSON" > "$tmp_json"
            mv "$tmp_json" "$ARTIFACTS_JSON"
          done

          jq -n \
            --arg latestVersion "$RELEASE_VERSION" \
            --arg generatedAt "$GENERATED_AT" \
            --slurpfile artifacts "$ARTIFACTS_JSON" \
            '{
              schemaVersion: 1,
              latestVersion: $latestVersion,
              generatedAt: $generatedAt,
              artifacts: $artifacts[0]
            }' > release-assets/meshscale-toolchains.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/meshscale-toolchains.json
